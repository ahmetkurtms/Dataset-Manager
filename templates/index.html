<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<!-- ═══════════════════════════ STATS DASHBOARD ═══════════════════════════ -->
<div id="statsDashboard" class="stats-dashboard">
    <div class="stats-header">
        <h1>Dataset Manager</h1>
        <div class="stats-total">
            <span id="totalCount">0</span> / <span id="totalTarget">1000</span>
            <div class="progress-bar-wrap">
                <div class="progress-bar total-bar" id="totalBar" style="width:0%"></div>
            </div>
        </div>
        <button class="stats-toggle" onclick="toggleComboGrid()" title="Toggle 32-combo grid">&#9783; Combos</button>
    </div>

    <div class="stats-dims">
        <!-- Class -->
        <div class="stats-group">
            <div class="stats-group-title">Class</div>
            <div class="stats-rows" id="statsClass"></div>
        </div>
        <!-- Modality -->
        <div class="stats-group">
            <div class="stats-group-title">Modality</div>
            <div class="stats-rows" id="statsModality"></div>
        </div>
        <!-- Resolution -->
        <div class="stats-group">
            <div class="stats-group-title">Resolution</div>
            <div class="stats-rows" id="statsResolution"></div>
        </div>
        <!-- Object Size -->
        <div class="stats-group">
            <div class="stats-group-title">Object Size</div>
            <div class="stats-rows" id="statsObjSize"></div>
        </div>
    </div>

    <!-- 32-Combo grid (collapsible) -->
    <div id="comboGrid" class="combo-grid hidden"></div>
</div>

<!-- ════════════════════════════ GALLERY AREA ════════════════════════════ -->
<div class="gallery-area">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchFolder('train')">Train</button>
        <button class="tab-btn" onclick="switchFolder('test')">Test</button>
        <button class="tab-btn" onclick="switchFolder('valid')">Valid</button>
        <button class="tab-btn" onclick="switchFolder('selected')">Selected</button>
        <span class="tab-count" id="folderCount"></span>
    </div>
    <div id="gallery" class="gallery">
        <div class="gallery-empty">Loading…</div>
    </div>
</div>

<!-- ══════════════════════════ IMAGE VIEWER MODAL ══════════════════════════ -->
<div id="modal" class="modal">
    <button class="close-btn" onclick="closeModal()">&times;</button>
    <div class="modal-info">
        <span id="modalFolderName"></span> / <span id="modalFileName"></span>
        <span id="modalMetadata"></span>
    </div>
    <div class="modal-content-wrapper">
        <img id="modalImage" class="modal-content" src="" alt="Viewer">
        <canvas id="labelCanvas"></canvas>
    </div>
    <div class="modal-controls">
        <button class="nav-btn" onclick="prevImage()">&#8592;</button>
        <button class="danger"  onclick="deleteCurrentImage()">Delete&nbsp;<kbd>Del</kbd></button>
        <button class="success" onclick="openLabelSelector()">Select&nbsp;<kbd>Enter</kbd></button>
        <button class="nav-btn" onclick="nextImage()">&#8594;</button>
    </div>
</div>

<!-- ══════════════════════════ LABEL SELECTOR MODAL ══════════════════════════ -->
<div id="labelModal" class="modal label-modal">
    <div class="label-panel">
        <h2>Label this image</h2>
        <div class="label-preview" id="labelPreview">img_????_…</div>

        <div class="label-groups">
            <!-- Modality -->
            <div class="label-group">
                <div class="label-group-title">Modality</div>
                <div class="label-options" id="optModality">
                    <button class="opt-btn" data-group="modality" data-value="rgb">RGB</button>
                    <button class="opt-btn" data-group="modality" data-value="thermal">Thermal</button>
                </div>
            </div>
            <!-- Resolution -->
            <div class="label-group">
                <div class="label-group-title">Resolution</div>
                <div class="label-options" id="optResolution">
                    <button class="opt-btn" data-group="resolution" data-value="small">Small</button>
                    <button class="opt-btn" data-group="resolution" data-value="large">Large</button>
                </div>
            </div>
            <!-- Object Size -->
            <div class="label-group">
                <div class="label-group-title">Object Size</div>
                <div class="label-options" id="optObjSize">
                    <button class="opt-btn" data-group="obj_size" data-value="small">Small</button>
                    <button class="opt-btn" data-group="obj_size" data-value="large">Large</button>
                </div>
            </div>
            <!-- Class -->
            <div class="label-group">
                <div class="label-group-title">Class</div>
                <div class="label-options" id="optClass">
                    <button class="opt-btn" data-group="class" data-value="airplane">Airplane</button>
                    <button class="opt-btn" data-group="class" data-value="bird">Bird</button>
                    <button class="opt-btn" data-group="class" data-value="drone">Drone</button>
                    <button class="opt-btn" data-group="class" data-value="helicopter">Helicopter</button>
                </div>
            </div>
        </div>

        <div class="label-actions">
            <button onclick="closeLabelSelector()">Cancel</button>
            <button class="success" id="confirmLabelBtn" onclick="confirmLabel()" disabled>Confirm &amp; Select</button>
        </div>
    </div>
</div>

<!-- ══════════════════════════════ SCRIPTS ══════════════════════════════ -->
<script>
// ── State ──────────────────────────────────────────────────────────────────
let images        = [];
let currentIndex  = -1;
let currentFolder = 'train';
let pendingLabel  = {};   // { modality, resolution, obj_size, class }

// ── Utilities ──────────────────────────────────────────────────────────────
function formatBytes(bytes) {
    if (!+bytes) return '0 B';
    const k = 1024, sizes = ['B','KB','MB','GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
}

function pct(val, max) { return max > 0 ? Math.min(100, (val / max * 100)).toFixed(1) : 0; }

// ── Stats Dashboard ────────────────────────────────────────────────────────
async function loadStats() {
    try {
        const r = await fetch('/api/stats');
        const s = await r.json();
        renderStats(s);
    } catch(e) { console.error('Stats error', e); }
}

function renderStats(s) {
    const t = s.targets;

    // Total
    document.getElementById('totalCount').textContent  = s.total;
    document.getElementById('totalTarget').textContent = t.total;
    document.getElementById('totalBar').style.width    = pct(s.total, t.total) + '%';

    renderDimRows('statsClass',      s.by_class,      t.class);
    renderDimRows('statsModality',   s.by_modality,   t.modality);
    renderDimRows('statsResolution', s.by_resolution, t.resolution);
    renderDimRows('statsObjSize',    s.by_obj_size,   t.obj_size);
    renderComboGrid(s.combos, t.combo);
}

function renderDimRows(containerId, data, target) {
    const el = document.getElementById(containerId);
    el.innerHTML = Object.entries(data).map(([key, val]) => {
        const p = pct(val, target);
        const done = val >= target ? ' done' : '';
        return `
        <div class="dim-row${done}">
            <span class="dim-label">${key}</span>
            <div class="dim-bar-wrap">
                <div class="dim-bar" style="width:${p}%"></div>
            </div>
            <span class="dim-count">${val}/${target}</span>
        </div>`;
    }).join('');
}

function renderComboGrid(combos, target) {
    const grid = document.getElementById('comboGrid');
    const modalities   = ['rgb','thermal'];
    const resolutions  = ['small','large'];
    const obj_sizes    = ['small','large'];
    const classes      = ['airplane','bird','drone','helicopter'];

    let html = '<div class="combo-scroll">';
    // Header row
    html += '<div class="combo-header-row">';
    html += '<div class="combo-axis-label">mod / res / obj</div>';
    classes.forEach(c => { html += `<div class="combo-class-head">${c}</div>`; });
    html += '</div>';

    for (const mod of modalities) {
        for (const res of resolutions) {
            for (const obj of obj_sizes) {
                html += '<div class="combo-row">';
                html += `<div class="combo-row-label">${mod} · ${res}res · ${obj}obj</div>`;
                for (const cls of classes) {
                    const key = `${mod}_${res}_${obj}_${cls}`;
                    const val = combos[key] || 0;
                    const p   = pct(val, target);
                    const done = val >= target ? ' combo-done' : '';
                    html += `<div class="combo-cell${done}" title="${key}: ${val}/${target}">
                        <div class="combo-cell-bar" style="width:${p}%"></div>
                        <span>${val}</span>
                    </div>`;
                }
                html += '</div>';
            }
        }
    }
    html += '</div>';
    grid.innerHTML = html;
}

function toggleComboGrid() {
    document.getElementById('comboGrid').classList.toggle('hidden');
}

// ── Gallery ────────────────────────────────────────────────────────────────
async function loadImages() {
    try {
        const r    = await fetch(`/api/images?folder=${currentFolder}`);
        const data = await r.json();
        if (JSON.stringify(data) !== JSON.stringify(images)) {
            images = data;
            renderGallery();
        }
        document.getElementById('folderCount').textContent =
            `${images.length} image${images.length !== 1 ? 's' : ''}`;
    } catch(e) { console.error('Gallery error', e); }
}

function renderGallery() {
    const gallery = document.getElementById('gallery');
    if (images.length === 0) {
        gallery.innerHTML = '<div class="gallery-empty">No images in this folder</div>';
        return;
    }
    gallery.innerHTML = '';
    images.forEach((img, index) => {
        const card = document.createElement('div');
        card.className = 'image-card';
        card.onclick   = () => openModal(index);

        // Build label badge for selected images
        let badge = '';
        if (img.label) {
            const l = img.label;
            badge = `<div class="label-badge">
                <span class="lbl-mod ${l.modality}">${l.modality}</span>
                <span class="lbl-cls">${l.class}</span>
            </div>`;
        }

        card.innerHTML = `
            <img src="/image/${img.path}" loading="lazy" alt="${img.name}">
            ${badge}
            <div class="image-info">
                <div class="image-name" title="${img.name}">${img.name}</div>
            </div>`;
        gallery.appendChild(card);
    });
}

function switchFolder(folder) {
    currentFolder = folder;
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.trim().toLowerCase() === folder);
    });
    images = [];
    document.getElementById('gallery').innerHTML = '<div class="gallery-empty">Loading…</div>';
    loadImages();
}

// ── Image Viewer Modal ─────────────────────────────────────────────────────
async function openModal(index) {
    if (index < 0 || index >= images.length) return;
    currentIndex = index;
    const img = images[index];

    const modalImg    = document.getElementById('modalImage');
    const canvas      = document.getElementById('labelCanvas');
    const ctx         = canvas.getContext('2d');
    const metaSpan    = document.getElementById('modalMetadata');

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    metaSpan.textContent = '';

    modalImg.src = `/image/${img.path}`;
    document.getElementById('modalFolderName').textContent = img.folder;
    document.getElementById('modalFileName').textContent   = img.name;
    document.getElementById('modal').classList.add('active');

    modalImg.onload = async () => {
        canvas.width         = modalImg.width;
        canvas.height        = modalImg.height;
        canvas.style.width   = modalImg.width  + 'px';
        canvas.style.height  = modalImg.height + 'px';

        const res  = `${modalImg.naturalWidth}×${modalImg.naturalHeight}`;
        const size = img.size ? formatBytes(img.size) : '?';
        metaSpan.textContent = `[${res} | ${size}]`;

        try {
            const lr = await fetch(`/api/labels/${img.path}`);
            const labels = await lr.json();
            if (Array.isArray(labels)) drawLabels(ctx, labels, modalImg.width, modalImg.height);
        } catch(e) {}
    };
}

function drawLabels(ctx, labels, W, H) {
    ctx.lineWidth = 2;
    ctx.font = '14px Arial';
    labels.forEach(l => {
        const x = (l.x - l.w/2)*W, y = (l.y - l.h/2)*H;
        const w = l.w*W,           h = l.h*H;
        ctx.strokeStyle = '#00ff00';
        ctx.strokeRect(x, y, w, h);
        const txt = `Class ${l.class}`;
        const tw  = ctx.measureText(txt).width;
        ctx.fillStyle = '#00ff00';
        ctx.fillRect(x, y-20, tw+6, 20);
        ctx.fillStyle = '#000';
        ctx.fillText(txt, x+3, y-5);
    });
}

function closeModal() {
    document.getElementById('modal').classList.remove('active');
    currentIndex = -1;
}

function nextImage() { if (currentIndex < images.length-1) openModal(currentIndex+1); }
function prevImage() { if (currentIndex > 0)               openModal(currentIndex-1); }

async function deleteCurrentImage() {
    if (currentIndex === -1) return;
    if (!confirm('Delete this image?')) return;
    const img = images[currentIndex];
    try {
        const r = await fetch(`/delete/${img.path}`, {method:'DELETE'});
        const res = await r.json();
        if (res.success) { handleImageRemoved(); loadStats(); }
        else alert('Error: ' + res.error);
    } catch(e) { alert('Delete failed'); }
}

function handleImageRemoved() {
    images.splice(currentIndex, 1);
    renderGallery();
    if (images.length === 0)          { closeModal(); }
    else if (currentIndex < images.length)  { openModal(currentIndex); }
    else                              { openModal(currentIndex-1); }
}

// ── Label Selector ─────────────────────────────────────────────────────────
function openLabelSelector() {
    if (currentIndex === -1) return;
    pendingLabel = {};
    // Reset all option buttons
    document.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('confirmLabelBtn').disabled = true;
    updateLabelPreview();
    document.getElementById('labelModal').classList.add('active');
}

function closeLabelSelector() {
    document.getElementById('labelModal').classList.remove('active');
}

// Bind option buttons
document.querySelectorAll('.opt-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const group = btn.dataset.group;
        // Deselect siblings
        btn.closest('.label-options').querySelectorAll('.opt-btn')
            .forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        pendingLabel[group] = btn.dataset.value;
        updateLabelPreview();
        checkLabelComplete();
    });
});

function checkLabelComplete() {
    const ok = ['modality','resolution','obj_size','class']
        .every(k => pendingLabel[k]);
    document.getElementById('confirmLabelBtn').disabled = !ok;
}

function updateLabelPreview() {
    const m   = pendingLabel.modality   || '???';
    const r   = pendingLabel.resolution || '???';
    const o   = pendingLabel.obj_size   || '???';
    const c   = pendingLabel.class      || '???';
    document.getElementById('labelPreview').textContent =
        `img_XXXX_${m}_${r}res_${o}obj_${c}.jpg`;
}

async function confirmLabel() {
    if (currentIndex === -1) return;
    const img = images[currentIndex];
    try {
        const r = await fetch(`/api/select/${img.path}`, {
            method:  'POST',
            headers: {'Content-Type': 'application/json'},
            body:    JSON.stringify(pendingLabel),
        });
        const res = await r.json();
        if (res.success) {
            closeLabelSelector();
            handleImageRemoved();
            loadStats();
        } else {
            alert('Error: ' + res.error);
        }
    } catch(e) { alert('Select failed'); }
}

// ── Keyboard shortcuts ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    const viewerOpen = document.getElementById('modal').classList.contains('active');
    const labelOpen  = document.getElementById('labelModal').classList.contains('active');

    if (labelOpen) {
        if (e.key === 'Escape') closeLabelSelector();
        return;
    }
    if (!viewerOpen) return;
    if (e.key === 'ArrowRight') { e.preventDefault(); nextImage(); }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); prevImage(); }
    if (e.key === 'Escape')     closeModal();
    if (e.key === 'Delete')     deleteCurrentImage();
    if (e.key === 'Enter')      openLabelSelector();
});

// ── Init & polling ─────────────────────────────────────────────────────────
loadImages();
loadStats();
setInterval(loadImages, 5000);
setInterval(loadStats,  5000);
</script>
</body>
</html>
