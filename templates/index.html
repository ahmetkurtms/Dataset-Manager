<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Manager</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <header>
        <h1>Dataset Manager</h1>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchFolder('train')">Train</button>
            <button class="tab-btn" onclick="switchFolder('test')">Test</button>
            <button class="tab-btn" onclick="switchFolder('valid')">Valid</button>
            <button class="tab-btn" onclick="switchFolder('selected')">Selected</button>
        </div>
    </header>

    <main>
        <div id="gallery" class="gallery">
            <!-- Images will be loaded here -->
        </div>
    </main>

    <div id="modal" class="modal">
        <button class="close-btn" onclick="closeModal()">&times;</button>
        <div class="modal-info">
            <span id="modalFolderName"></span> / <span id="modalFileName"></span>
            <span id="modalMetadata" style="margin-left: 20px; font-size: 0.9em; color: #aaa;"></span>
        </div>
        <div class="modal-content-wrapper" style="position: relative; display: inline-block;">
            <img id="modalImage" class="modal-content" src="" alt="Viewer"
                style="display: block; max-width: 90vw; max-height: 80vh;">
            <canvas id="labelCanvas" style="position: absolute; top: 0; left: 0; pointer-events: none;"></canvas>
        </div>
        <div class="modal-controls">
            <button class="nav-btn" onclick="prevImage()">&larr;</button>
            <button class="danger" onclick="deleteCurrentImage()">Delete (Del)</button>
            <button class="success" onclick="selectCurrentImage()">Select (Enter)</button>
            <button class="nav-btn" onclick="nextImage()">&rarr;</button>
        </div>
    </div>

    <script>
        let images = [];
        let currentIndex = -1;
        let currentFolder = 'train';
        let pollInterval;

        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        async function loadImages() {
            try {
                const response = await fetch(`/api/images?folder=${currentFolder}`);
                const newImages = await response.json();

                if (JSON.stringify(newImages) !== JSON.stringify(images)) {
                    images = newImages;
                    renderGallery();
                }
            } catch (error) {
                console.error('Error loading images:', error);
            }
        }

        function renderGallery() {
            const gallery = document.getElementById('gallery');
            gallery.innerHTML = '';

            if (images.length === 0) {
                gallery.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #888;">No images in this folder</div>';
                return;
            }

            images.forEach((img, index) => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.onclick = () => openModal(index);

                card.innerHTML = `
                    <img src="/image/${img.path}" loading="lazy" alt="${img.name}">
                    <div class="image-info">
                        <div class="image-name" title="${img.name}">${img.name}</div>
                    </div>
                `;
                gallery.appendChild(card);
            });
        }

        function switchFolder(folder) {
            currentFolder = folder;

            document.querySelectorAll('.tab-btn').forEach(btn => {
                if (btn.textContent.toLowerCase() === folder) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            images = [];
            document.getElementById('gallery').innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #888;">Loading...</div>';
            loadImages();
        }

        async function openModal(index) {
            if (index < 0 || index >= images.length) return;
            currentIndex = index;
            const img = images[index];

            const modalImg = document.getElementById('modalImage');
            const canvas = document.getElementById('labelCanvas');
            const ctx = canvas.getContext('2d');
            const metadataSpan = document.getElementById('modalMetadata');

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            metadataSpan.textContent = '';

            modalImg.src = `/image/${img.path}`;
            document.getElementById('modalFolderName').textContent = img.folder;
            document.getElementById('modalFileName').textContent = img.name;
            document.getElementById('modal').classList.add('active');

            modalImg.onload = async () => {
                canvas.width = modalImg.width;
                canvas.height = modalImg.height;
                canvas.style.width = modalImg.width + 'px';
                canvas.style.height = modalImg.height + 'px';

                const resolution = `${modalImg.naturalWidth}x${modalImg.naturalHeight}`;
                const size = img.size ? formatBytes(img.size) : 'Unknown size';
                metadataSpan.textContent = `[${resolution} | ${size}]`;

                try {
                    const response = await fetch(`/api/labels/${img.path}`);
                    const labels = await response.json();

                    if (Array.isArray(labels)) {
                        drawLabels(ctx, labels, modalImg.width, modalImg.height);
                    }
                } catch (error) {
                    console.error('Error fetching labels:', error);
                }
            };
        }

        function drawLabels(ctx, labels, imgWidth, imgHeight) {
            ctx.lineWidth = 2;
            ctx.font = '16px Arial';

            labels.forEach(label => {
                const x = (label.x - label.w / 2) * imgWidth;
                const y = (label.y - label.h / 2) * imgHeight;
                const w = label.w * imgWidth;
                const h = label.h * imgHeight;

                ctx.strokeStyle = '#00ff00';
                ctx.strokeRect(x, y, w, h);

                const text = `Class ${label.class}`;
                const textMetrics = ctx.measureText(text);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(x, y - 20, textMetrics.width + 4, 20);

                ctx.fillStyle = 'black';
                ctx.fillText(text, x + 2, y - 5);
            });
        }

        function closeModal() {
            document.getElementById('modal').classList.remove('active');
            currentIndex = -1;
        }

        function nextImage() {
            if (currentIndex < images.length - 1) {
                openModal(currentIndex + 1);
            }
        }

        function prevImage() {
            if (currentIndex > 0) {
                openModal(currentIndex - 1);
            }
        }

        async function deleteCurrentImage() {
            if (currentIndex === -1) return;

            if (!confirm('Are you sure you want to delete this image?')) return;

            const img = images[currentIndex];
            try {
                const response = await fetch(`/delete/${img.path}`, { method: 'DELETE' });
                const result = await response.json();

                if (result.success) {
                    handleImageRemoved();
                } else {
                    alert('Error deleting image: ' + result.error);
                }
            } catch (error) {
                console.error('Error deleting image:', error);
                alert('Failed to delete image');
            }
        }

        async function selectCurrentImage() {
            if (currentIndex === -1) return;

            const img = images[currentIndex];
            try {
                const response = await fetch(`/api/select/${img.path}`, { method: 'POST' });
                const result = await response.json();

                if (result.success) {
                    handleImageRemoved();
                } else {
                    alert('Error selecting image: ' + result.error);
                }
            } catch (error) {
                console.error('Error selecting image:', error);
                alert('Failed to select image');
            }
        }

        function handleImageRemoved() {
            images.splice(currentIndex, 1);
            renderGallery();

            if (images.length === 0) {
                closeModal();
            } else if (currentIndex < images.length) {
                openModal(currentIndex);
            } else {
                openModal(currentIndex - 1);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('modal').classList.contains('active')) return;

            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
            if (e.key === 'Escape') closeModal();
            if (e.key === 'Delete') deleteCurrentImage();
            if (e.key === 'Enter') selectCurrentImage();
        });

        loadImages();
        pollInterval = setInterval(loadImages, 5000);
    </script>
</body>

</html>
